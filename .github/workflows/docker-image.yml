name: Docker Image CI

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Rebuild CI image
        run: docker build -f docker/ci/Dockerfile -t ananas-ci:latest .

      - name: Check Qt toolchain
        run: |
          docker run --rm ananas-ci:latest bash -lc "qmake-qt4 -v"

      - name: Build qdataschema
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace/third-party/qdataschema/src \
            ananas-ci:latest \
            bash -lc "
              qmake-qt4
              make -j1
            "

      - name: Build Ananas core library
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace/src/lib \
            ananas-ci:latest \
            bash -lc "
              qmake-qt4
              make -j1
            "

      - name: Build extensions
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace/src/extensions \
            ananas-ci:latest \
            bash -lc "
              qmake-qt4
              make -j1
            "

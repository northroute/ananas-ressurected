name: Docker Image CI

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - group: extensions
            module: aextsql
          - group: extensions
            module: example
          - group: extensions
            module: meta
          - group: extensions
            module: service
          - group: extensions
            module: text
          - group: extensions
            module: xml

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Rebuild CI image
        run: docker build -f docker/ci/Dockerfile -t ananas-ci:latest .

      - name: Check Qt toolchain
        run: |
          docker run --rm ananas-ci:latest bash -lc "qmake-qt4 -v"

      - name: Build module
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ananas-ci:latest \
            bash -lc "
              cd src/${{ matrix.group }}/${{ matrix.module }}
              qmake-qt4
              make -j1
            "

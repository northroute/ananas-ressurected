name: Docker Image CI

on:
  push:
    branches:
      - master
      - develop
  pull_request:
    branches:
      - master
      - develop

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Rebuild CI image
        run: docker build -f docker/ci/Dockerfile -t ananas-ci:latest .

      - name: Check Qt toolchain
        run: |
          docker run --rm ananas-ci:latest bash -lc "qmake-qt4 -v"

      - name: Build qdataschema and Ananas
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            ananas-ci:latest \
            bash -lc "
              set -e

              mkdir -p /workspace/lib

              cd /workspace/third-party/qdataschema/src
              qmake-qt4
              make -j$(nproc)

              cp -af /workspace/third-party/qdataschema/lib/libqt4-qdataschema.so* /workspace/lib/

              cd /workspace/src
              qmake-qt4
              make -j$(nproc)
            "